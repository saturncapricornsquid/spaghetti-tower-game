<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spaghetti Tower Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Matter.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 10;
      width: 220px;
    }

    button {
      display: block;
      margin: 6px 0;
      padding: 6px 10px;
      cursor: pointer;
      width: 100%;
    }

    #score {
      margin-top: 8px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="hud">
    <div>Mode: <strong id="mode">spaghetti</strong></div>
    <div>Rotation: <strong id="rotation">0</strong> deg</div>

    <button id="toggle">Switch material</button>
    <button id="rotate">Rotate</button>
    <button id="reset">Reset</button>

    <div id="score">Score: 0</div>

    <div style="font-size:12px;margin-top:8px;">
      Press <b>T</b> for final test
    </div>
  </div>

  <canvas id="game"></canvas>

  <script src="main.js"></script>

</body>
</html>

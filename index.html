<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spaghetti Tower Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Matter.js physics engine -->
  https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.jsscript>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 280px;
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 10;
      line-height: 1.6;
    }

    #hud button {
      margin-top: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f8f8f8;
    }

    #hud button:hover {
      background: #eeeeee;
    }

    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #333;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div>⏱️ Time: <span id="time">00:30</span></div>
    <div>🍝 Spaghetti left: <span id="count">20</span></div>
    <div>🏆 Score: <span id="score">0</span></div>
    <div id="status">Click in the grey play area to place spaghetti</div>
    <button id="add">Reset game</button>
  </div>

  <canvas id="game"></canvas>

  main.jsscript>
</body>
</html>

<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <title>Spaghetti Tower Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f3f3;
      overflow: hidden;
    }

    canvas { display: block; }

    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 260px;
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,.2);
      z-index: 10;
    }

    button {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border-radius: 999px;
      border: none;
      background: #333;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.primary { background: #e60000; }

    #toast {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,.85);
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="resetBtn">Reset</button>
    <button id="addSpaghettiBtn" class="primary">Add spaghetti</button>
  </div>

  <div id="toast">Ready.</div>

  <canvas id="game"></canvas>

  <!-- ✅ THIS MUST BE EXACTLY LIKE THIS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <!-- ✅ Your code -->
  <script src="main.js"></script>

</body>
</html>

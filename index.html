<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spaghetti Tower Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Matter.js physics engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 10;
      line-height: 1.6;
    }

    #hud button {
      margin-top: 8px;
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div>⏱️ Time: <span id="time">18:00</span></div>
    <div>🍝 Spaghetti left: <span id="count">20</span></div>
    <button id="add">Add spaghetti</button>
  </div>

  <canvas id="game"></canvas>

  <!-- Your game code -->
  <script src="main.js"></script>
</body>
</html>

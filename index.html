<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spaghetti Tower Challenge</title>

  <style>
    :root{
      --vt-red:#e60000;
      --vt-accent:#8f2bd1;
      --panel: rgba(255,255,255,0.96);
      --shadow: 0 10px 30px rgba(0,0,0,0.18);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; overflow:hidden;
      background: linear-gradient(180deg,#fafafa,#f3f3f3);
      font-family: Arial, Helvetica, sans-serif;
    }
    canvas{ display:block; }

    .brand-bar{
      position:fixed; top:0; left:0; right:0;
      height:56px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px;
      background: linear-gradient(90deg,var(--vt-red),var(--vt-accent));
      color:#fff; z-index:30;
    }

    .hud{
      position:absolute; top:70px; left:12px;
      background: rgba(24,24,24,0.84);
      color:#fff;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      z-index:10;
      min-width:380px;
      line-height:1.35;
    }
    .hud.right{
      right:12px; left:auto;
      text-align:right;
      min-width:260px;
    }
    .hud .row{ display:flex; justify-content:space-between; gap:12px; margin-top:4px; }
    .hud small{ opacity:0.85; }

    .panel{
      background: var(--panel);
      padding:12px;
      border-radius:14px;
      box-shadow: var(--shadow);
      font-size:13px;
      color:#111;
      margin-top:12px;
    }

    table{ width:100%; border-collapse:collapse; font-size:12px; }
    th, td{ padding:6px 8px; border-bottom:1px solid #eee; text-align:left; }
    th{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:#666; }
    .muted{ color:#666; }

    .controls{
      position:absolute; top:150px; right:12px;
      width:320px; z-index:10;
    }

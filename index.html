<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spaghetti Tower</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Matter.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 10;
    }

    button {
      display: block;
      margin: 6px 0;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div>Mode: <strong id="mode">spaghetti</strong></div>
    <div>Rotation: <strong id="rotation">0</strong>°</div>

    <button id="toggle">Switch material</button>
    <button id="rotate">Rotate</button>
    <button id="reset">Reset</button>
  </div>

  <canvas id="game"></canvas>

  <!-- Your JS -->
  <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spaghetti Tower Challenge</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f3f3;
    }

    canvas {
      display: block;
    }

    .controls {
      position: fixed;
      right: 12px;
      top: 80px;
      width: 300px;
      background: #ffffff;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      z-index: 10;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      background: #333;
      color: #fff;
      cursor: pointer;
      margin: 4px 0;
      width: 100%;
    }

    button.primary {
      background: #e60000;
    }

    #toast {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="controls">
    <input id="teamName" placeholder="Team / Person" style="width:100%;padding:8px;border-radius:999px;border:1px solid #ccc;" />
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
    <button id="resetBtn">Reset</button>
    <button id="addSpaghettiBtn" class="primary">Add spaghetti</button>
    <button id="glueBtn">Glue (tape/string)</button>
  </div>

  <div id="toast">Ready.</div>

  <canvas id="game"></canvas>

  <!-- ✅ CORRECT Matter.js include -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <!-- ✅ Game logic -->
  <script src="main.js"></script>

</body>
</html>
